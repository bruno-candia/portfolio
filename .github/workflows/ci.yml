name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint Check
        run: npm run lint

      - name: Unit Tests (Vitest)
        run: npx vitest run

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: E2E Tests (Playwright)
        run: npx playwright test
        env:
          CI: true

  terraform-check:
    name: Terraform Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.15.7'
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Format Check (Fmt)
        run: terraform fmt -check
        working-directory: terraform

      - name: Initialize
        run: terraform init -backend=false
        working-directory: terraform

      - name: Validate Configuration
        run: terraform validate
        working-directory: terraform

      - name: Initialize Remote Backend
        if: github.event_name == 'pull_request' || (github.ref == 'refs/heads/master' && github.event_name == 'push')
        run: terraform init
        working-directory: terraform

      - name: Plan (Pull Request)
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color
        working-directory: terraform
        env:
          TF_VAR_app_secret_api_key: ${{ secrets.APP_SECRET_API_KEY }}
          TF_VAR_sentry_dsn: ${{ secrets.SENTRY_DSN }}
          TF_VAR_ga_measurement_id: ${{ secrets.GA_MEASUREMENT_ID }}
          TF_VAR_ga_api_secret: ${{ secrets.GA_API_SECRET }}
          TF_VAR_consent_secret: ${{ secrets.CONSENT_SECRET }}

      - name: Apply (Push to Master)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: terraform apply -auto-approve
        working-directory: terraform
        env:
          TF_VAR_app_secret_api_key: ${{ secrets.APP_SECRET_API_KEY }}
          TF_VAR_sentry_dsn: ${{ secrets.SENTRY_DSN }}
          TF_VAR_ga_measurement_id: ${{ secrets.GA_MEASUREMENT_ID }}
          TF_VAR_ga_api_secret: ${{ secrets.GA_API_SECRET }}
          TF_VAR_consent_secret: ${{ secrets.CONSENT_SECRET }}
