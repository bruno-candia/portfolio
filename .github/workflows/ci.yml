name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint Check
        run: npm run lint

      - name: Unit Tests (Vitest)
        run: npx vitest run

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: E2E Tests (Playwright)
        run: npx playwright test
        env:
          CI: true

  terraform-check:
    name: Terraform Lint & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.15.7'
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Format Check (Fmt)
        id: fmt
        run: terraform fmt -check
        working-directory: terraform
        continue-on-error: true

      - name: Initialize
        id: init
        run: terraform init -backend=false
        working-directory: terraform

      - name: Validate Configuration
        id: validate
        run: terraform validate
        working-directory: terraform
        continue-on-error: true

      - name: Initialize Remote Backend
        if: github.event_name == 'pull_request' || (github.ref == 'refs/heads/master' && github.event_name == 'push')
        run: terraform init
        working-directory: terraform

      - name: Plan (Pull Request)
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color > plan.txt 2>&1
        working-directory: terraform
        continue-on-error: true
        env:
          TF_VAR_app_secret_api_key: ${{ secrets.APP_SECRET_API_KEY }}
          TF_VAR_sentry_dsn: ${{ secrets.SENTRY_DSN }}
          TF_VAR_ga_measurement_id: ${{ secrets.GA_MEASUREMENT_ID }}
          TF_VAR_ga_api_secret: ${{ secrets.GA_API_SECRET }}
          TF_VAR_consent_secret: ${{ secrets.CONSENT_SECRET }}

      - name: Update Pull Request
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('./terraform/plan.txt', 'utf8');
            const maxLen = 65000;
            const plan = planOutput.length > maxLen ? planOutput.substring(0, maxLen) + '\n... (truncado)' : planOutput;

            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Mostrar Plano (Show Plan)</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail Plan Workflow if Error
        if: steps.plan.outcome == 'failure' || steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: exit 1

      - name: Apply (Push to Master)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: terraform apply -auto-approve
        working-directory: terraform
        env:
          TF_VAR_app_secret_api_key: ${{ secrets.APP_SECRET_API_KEY }}
          TF_VAR_sentry_dsn: ${{ secrets.SENTRY_DSN }}
          TF_VAR_ga_measurement_id: ${{ secrets.GA_MEASUREMENT_ID }}
          TF_VAR_ga_api_secret: ${{ secrets.GA_API_SECRET }}
          TF_VAR_consent_secret: ${{ secrets.CONSENT_SECRET }}
